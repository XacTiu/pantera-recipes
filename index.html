<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>PanteraGrow Recipes</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--black:#0a0a0a;--dark:#111111;--surface:#1a1a1a;--surface2:#222222;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--accent:#e8c44a;--text:#f0f0f0;--muted:#888;--danger:#e05c4a;--green:#5ab87a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--black);color:var(--text);font-family:'Barlow',sans-serif;overflow:hidden}
#splash{position:fixed;inset:0;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .6s ease}
#splash.hide{opacity:0;pointer-events:none}
#splash img{width:160px;opacity:0;animation:fadeUp .8s .2s forwards}
.sp-title{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-top:20px;opacity:0;animation:fadeUp .8s .5s forwards}
.sp-sub{font-size:11px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-top:6px;opacity:0;animation:fadeUp .8s .7s forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
#app{height:100%;display:flex;flex-direction:column;opacity:0;transition:opacity .5s}
#app.show{opacity:1}
header{background:var(--dark);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;gap:12px;flex-shrink:0}
header img{width:30px;height:30px;object-fit:contain}
.h-title{font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;letter-spacing:.08em;color:var(--accent)}
.h-sub{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px}
.slabel{font-size:10px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px;margin-top:4px}
.brand-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.brand-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 12px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.brand-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .2s}
.brand-card.sel{border-color:var(--accent);background:rgba(232,196,74,0.06)}
.brand-card.sel::before{transform:scaleX(1)}
.bc-name{font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.bc-count{font-size:11px;color:var(--muted);margin-top:3px}
.prod-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.prod-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:all .15s;display:flex;justify-content:space-between;align-items:center}
.prod-item.sel{border-color:var(--accent);background:rgba(232,196,74,0.06)}
.pi-name{font-family:'Oswald',sans-serif;font-size:14px;font-weight:500;letter-spacing:.04em}
.pi-code{font-size:11px;color:var(--muted);margin-top:2px}
.pi-arrow{color:var(--muted);font-size:18px}
.prod-item.sel .pi-arrow{color:var(--accent)}
.mode-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.mode-btn{padding:10px 6px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-family:'Oswald',sans-serif;font-size:12px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .15s;text-align:center}
.mode-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(232,196,74,0.06)}
.input-block{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:16px}
.input-block label{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:8px}
.val-row{display:flex;align-items:center;gap:10px}
.big-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:12px 14px;font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;color:var(--accent);text-align:right;-moz-appearance:textfield}
.big-input::-webkit-inner-spin-button,.big-input::-webkit-outer-spin-button{-webkit-appearance:none}
.big-input:focus{outline:none;border-color:var(--accent)}
.unit-label{font-family:'Oswald',sans-serif;font-size:18px;color:var(--muted)}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.result-header{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.rh-label{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.total-kg{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:var(--accent)}
.ing-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border)}
.ing-row:last-child{border-bottom:none}
.ing-row.base{background:rgba(232,196,74,0.04)}
.ing-name{font-size:14px;font-weight:500}
.ing-badge{display:inline-block;font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:3px;margin-left:6px;vertical-align:middle}
.badge-base{background:rgba(232,196,74,0.15);color:var(--accent)}
.badge-add{background:rgba(90,184,122,0.15);color:var(--green)}
.ing-pct{font-size:11px;color:var(--muted);margin-top:2px}
.ing-kg{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--text)}
.ing-kg span{font-size:11px;color:var(--muted);font-family:'Barlow',sans-serif;font-weight:400;margin-left:2px}
.warn-box{background:rgba(224,92,74,0.1);border:1px solid rgba(224,92,74,0.3);border-radius:8px;padding:12px 14px;margin-top:12px;font-size:13px;color:#e8a090;display:flex;gap:8px}
.empty-hint{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
.eh-icon{font-size:40px;margin-bottom:12px;opacity:.3}
.equiv{text-align:right;font-size:12px;color:var(--muted);margin-top:6px}
.pantera-bg{position:fixed;bottom:0;right:-20px;width:200px;opacity:.04;pointer-events:none;z-index:0}
</style>
</head>
<body>

<div id="splash">
  <img src="" alt="Logo">
  <div class="sp-title">PanteraGrow</div>
  <div class="sp-sub">Recipes</div>
</div>

<div id="app">
  <header>
    <img src="" alt="">
    <div><div class="h-title">PanteraGrow</div><div class="h-sub">Recipes</div></div>
  </header>

  <div class="screen">
    <div id="scr-main">
      <div class="slabel">1 &middot; Selecciona marca</div>
      <div class="brand-grid" id="brand-grid"></div>
      <div id="block-prod" style="display:none">
        <div class="slabel">2 &middot; Selecciona producto</div>
        <div class="prod-list" id="prod-list"></div>
      </div>
      <div id="block-calc" style="display:none">
        <div class="slabel">3 &middot; Cantidad a fabricar</div>
        <div class="mode-row">
          <button class="mode-btn active" id="mb-lote" onclick="setMode('lote')">Lote</button>
          <button class="mode-btn" id="mb-peso" onclick="setMode('peso')">Peso exacto</button>
        </div>
        <div class="input-block" id="inp-lote">
          <label id="lbl-sacos">Sacos</label>
          <div class="val-row">
            <input class="big-input" type="number" id="v-sacos" value="1" min="0.1" step="0.1" oninput="calc()">
            <span class="unit-label" id="u-sacos">sacos</span>
          </div>
          <div class="equiv" id="equiv-kg"></div>
        </div>
        <div class="input-block" id="inp-peso" style="display:none">
          <label>Peso final</label>
          <div class="val-row">
            <input class="big-input" type="number" id="v-peso" value="20" min="1" step="1" oninput="calc()">
            <span class="unit-label">kg</span>
          </div>
        </div>
        <div class="slabel">Resultado</div>
        <div class="result-card">
          <div class="result-header"><span class="rh-label">Ingredientes</span><span class="total-kg" id="total-out">— kg total</span></div>
          <div id="result-body"></div>
        </div>
        <div id="warn-area"></div>
      </div>
      <div id="no-sel" class="empty-hint"><div class="eh-icon">&#9883;</div>Selecciona marca y producto.</div>
    </div>
  </div>
</div>

<script>
var DB = {"brands":[{"id":1,"name":"33PRO"},{"id":2,"name":"TURBO NUTRIENTS"},{"id":3,"name":"LCK"}],"products":[{"id":101,"brandId":1,"name":"PK-PRO","code":"PKP","lote_sacos":2,"notas":"Evitar la humedad (deshumidificadores). Picar mezcla en molinillo.","ingredientes":[{"nombre":"MKP 52-34 HAIFA","pct":99.82,"tipo":"base","saco_kg":25},{"nombre":"Vitamina B1","pct":0.05,"tipo":"aditivo"},{"nombre":"Vitamiona B12","pct":0.05,"tipo":"aditivo"},{"nombre":"Colorante Amarillo","pct":0.08,"tipo":"aditivo"}]},{"id":102,"brandId":1,"name":"Bloom Max","code":"BM-01","lote_sacos":20,"notas":"","ingredientes":[{"nombre":"Sulfato de amonio","pct":40,"tipo":"base","saco_kg":25},{"nombre":"Fosfato monoamonico","pct":40,"tipo":"base"},{"nombre":"Sulfato magnesico","pct":18,"tipo":"base"},{"nombre":"Colorante rojo","pct":1,"tipo":"aditivo"},{"nombre":"Fragancia floral","pct":1,"tipo":"aditivo"}]},{"id":201,"brandId":2,"name":"Turbo Grow","code":"TG-01","lote_sacos":10,"notas":"","ingredientes":[{"nombre":"Urea","pct":45,"tipo":"base","saco_kg":25},{"nombre":"Fosfato monoamonico","pct":35,"tipo":"base"},{"nombre":"Sulfato magnesico","pct":18,"tipo":"base"},{"nombre":"Colorante verde","pct":2,"tipo":"aditivo"}]}]};
var selBrand=null,selProd=null,calcMode="lote";
setTimeout(function(){document.getElementById("splash").classList.add("hide");document.getElementById("app").classList.add("show");renderBrands();},2200);
function renderBrands(){var g=document.getElementById("brand-grid");g.innerHTML=DB.brands.map(function(b){var c=DB.products.filter(function(p){return p.brandId===b.id;}).length;return'<div class="brand-card'+(b.id===selBrand?' sel':'')+'" onclick="pickBrand('+b.id+')">'+'<div class="bc-name">'+b.name+'</div><div class="bc-count">'+c+' producto'+(c!==1?'s':'')+'</div></div>';}).join("");}
function pickBrand(id){selBrand=id;selProd=null;renderBrands();var prods=DB.products.filter(function(p){return p.brandId===id;});document.getElementById("block-prod").style.display="";document.getElementById("block-calc").style.display="none";document.getElementById("no-sel").style.display="none";document.getElementById("prod-list").innerHTML=prods.map(function(p){return'<div class="prod-item" onclick="pickProd('+p.id+',this)"><div><div class="pi-name">'+p.name+'</div><div class="pi-code">'+p.code+' &middot; '+p.lote_sacos+' sacos std</div></div><div class="pi-arrow">&#8250;</div></div>';}).join("");}
function pickProd(id,el){selProd=id;document.querySelectorAll(".prod-item").forEach(function(e){e.classList.remove("sel");});if(el)el.classList.add("sel");var p=DB.products.find(function(x){return x.id===id;});var base=p.ingredientes.find(function(i){return i.tipo==="base"&&i.saco_kg;});document.getElementById("lbl-sacos").textContent=base?"Sacos de "+base.nombre:"Sacos de base";document.getElementById("u-sacos").textContent="x "+(base?base.saco_kg:25)+" kg";document.getElementById("v-sacos").value=p.lote_sacos||1;document.getElementById("block-calc").style.display="";setMode("lote");calc();setTimeout(function(){document.getElementById("block-calc").scrollIntoView({behavior:"smooth"});},100);}
function setMode(m){calcMode=m;["lote","peso"].forEach(function(x){document.getElementById("mb-"+x).classList.toggle("active",x===m);document.getElementById("inp-"+x).style.display=x===m?"":"none";});calc();}
function calc(){var p=DB.products.find(function(x){return x.id===selProd;});if(!p)return;var base=p.ingredientes.find(function(i){return i.tipo==="base"&&i.saco_kg;});var total;if(calcMode==="lote"){var s=parseFloat(document.getElementById("v-sacos").value)||1;var sk=base?(base.saco_kg||25):25;var bkg=s*sk;total=base?bkg/(base.pct/100):bkg;var eq=document.getElementById("equiv-kg");if(eq)eq.textContent="= "+bkg.toFixed(1)+" kg de "+(base?base.nombre:"base")+" · "+total.toFixed(1)+" kg total";}else{total=parseFloat(document.getElementById("v-peso").value)||20;}document.getElementById("total-out").textContent=total.toFixed(1)+" kg total";document.getElementById("result-body").innerHTML=p.ingredientes.map(function(ing){var kg=total*(ing.pct/100);return'<div class="ing-row'+(ing.tipo==="base"?" base":"")+'"><div><div class="ing-name">'+ing.nombre+'<span class="ing-badge '+(ing.tipo==="base"?"badge-base":"badge-add")+'">'+ing.tipo+'</span></div><div class="ing-pct">'+ing.pct+'%</div></div><div class="ing-kg">'+kg.toFixed(2)+'<span>kg</span></div></div>';}).join("");document.getElementById("warn-area").innerHTML=p.notas?'<div class="warn-box"><span>&#9888;</span><span>'+p.notas+'</span></div>':"";}
renderBrands();document.getElementById("no-sel").style.display="";
</script>
</body>
</html>
